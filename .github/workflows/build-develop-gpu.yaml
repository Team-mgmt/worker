name: Build and Deploy GPU (Develop)

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: namespace-profile-ubuntu-latest-amd64-small
    environment: development

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    outputs:
      sha_short: ${{ steps.git-data.outputs.sha_short }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: namespacelabs/nscloud-checkout-action@938f5d2d403d6224d9a0c0dc559b1dae09c2ede4 # v8.1.1
        with:
          submodules: recursive

      - name: Checkout Database Schema
        uses: namespacelabs/nscloud-checkout-action@938f5d2d403d6224d9a0c0dc559b1dae09c2ede4 # v8.1.1
        with:
          repository: ${{ vars.QMR_WEB_REPOSITORY }}
          ref: develop
          fetch-depth: 1
          path: qmr-web
          token: ${{ secrets.QMR_WEB_ACCESS_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          run_install: false
          package_json_file: qmr-web/package.json

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: "qmr-web/.node-version"
          cache: "pnpm"
          cache-dependency-path: "qmr-web/pnpm-lock.yaml"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Get architecture
        id: arch
        run: echo "arch=$(uname -m)" >> "$GITHUB_OUTPUT"

      - name: Set up framework caches
        uses: namespacelabs/nscloud-cache-action@a90bb5d4b27522ce881c6e98eebd7d7e6d1653f9 # v1.4.2
        with:
          cache: |
            pnpm
            uv

      - name: Set up wheels cache
        uses: namespacelabs/nscloud-cache-action@a90bb5d4b27522ce881c6e98eebd7d7e6d1653f9 # v1.4.2
        with:
          path: |
            ${{ github.workspace }}/wheels

      - name: Deploy Database Schema
        run: |
          cd qmr-web
          pnpm install
          pnpm --filter @qmr/database run deploy
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: postgres
          DATABASE_PASS: postgres
          DATABASE_NAME: postgres

      - name: Generate Database Schema
        run: |
          uv sync --locked --only-group schema
          uv run ./scripts/generate.sh --silent
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: postgres
          DATABASE_PASS: postgres
          DATABASE_NAME: postgres

      - name: Lint
        run: |
          uv sync --locked
          uv run python -m mypy worker --show-error-context

      - name: Export requirements
        run: |
          uv sync --locked --no-dev --group gpu --no-editable
          uv export --no-emit-project --no-dev --group gpu \
            --no-editable --no-emit-package romav2 > requirements.txt

      - name: Build wheels
        env:
          ARCH: ${{ steps.arch.outputs.arch }}
          PYPI_HASH: ${{ hashFiles('uv.lock') }}
          ROMAV2_HASH: ${{ hashFiles('vendor/romav2/**') }}
        run: bash .github/workflows/scripts/build-gpu-wheels.sh

      - name: Update requirements with wheel hashes
        run: bash scripts/update-hashes.sh "wheels/pypi" "requirements.txt"

      - name: Get Git Data
        id: git-data
        run: |
          git config --global core.abbrev 8
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create Version String
        id: version
        env:
          MAJOR_VERSION: ${{ vars.MAJOR_VERSION }}
        run: |
          DATE=$(date +'%y%m%d')
          TIME=$(date +'%H%M')
          echo "version=${MAJOR_VERSION}.${DATE}.${TIME}+${{ steps.git-data.outputs.sha_short }}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_NAME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload wheels to S3
        env:
          CODEDEPLOY_S3_LOCATION: ${{ vars.CODEDEPLOY_S3_BUCKET }}
        run: bash .github/workflows/scripts/upload-gpu-wheels.sh

      - name: Create deployment revision
        id: revision
        env:
          EXCLUDE_WHEELS: "true"
          REVISION_PREFIX: qmr-worker-gpu
          SHA_SHORT: ${{ steps.git-data.outputs.sha_short }}
        run: bash .github/workflows/scripts/create-deployment-revision.sh

      - name: Upload revision to S3
        env:
          CODEDEPLOY_S3_LOCATION: ${{ vars.CODEDEPLOY_S3_BUCKET }}
          REVISION_LATEST_NAME: latest-gpu.zip
          REVISION_NAME: ${{ steps.revision.outputs.revision_name }}
        run: bash .github/workflows/scripts/upload-revision.sh

  # Note: Deploy tasks does not checkout code, so we should not use scripts from .github/workflows/scripts.
  deploy-develop-gpu:
    runs-on: namespace-profile-ubuntu-latest-amd64-micro
    environment: development
    needs:
      - build

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_NAME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Create CodeDeploy deployment
        id: deploy
        env:
          CODEDEPLOY_APPLICATION: ${{ vars.CODEDEPLOY_APPLICATION }}
          CODEDEPLOY_DEPLOYMENT_GROUP: ${{ vars.CODEDEPLOY_DEPLOYMENT_GROUP_GPU }}
          CODEDEPLOY_S3_LOCATION: ${{ vars.CODEDEPLOY_S3_BUCKET }}
          SHA_SHORT: ${{ needs.build.outputs.sha_short }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          # Extract bucket and prefix from location
          CODEDEPLOY_S3_BUCKET="${CODEDEPLOY_S3_LOCATION%%/*}"
          if [[ "${CODEDEPLOY_S3_LOCATION}" == *"/"* ]]; then
            S3_KEY="${CODEDEPLOY_S3_LOCATION#*/}/revisions/qmr-worker-gpu-${SHA_SHORT}.zip"
          else
            S3_KEY="revisions/qmr-worker-gpu-${SHA_SHORT}.zip"
          fi

          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name "${CODEDEPLOY_APPLICATION}" \
            --deployment-group-name "${CODEDEPLOY_DEPLOYMENT_GROUP}" \
            --s3-location bucket="${CODEDEPLOY_S3_BUCKET}",key="${S3_KEY}",bundleType=zip \
            --description "Deploy ${VERSION} from GitHub Actions" \
            --query 'deploymentId' \
            --output text)
          echo "Deployment ID: ${DEPLOYMENT_ID}"
          echo "deployment_id=${DEPLOYMENT_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for deployment
        env:
          DEPLOYMENT_ID: ${{ steps.deploy.outputs.deployment_id }}
        run: |
          aws deploy wait deployment-successful --deployment-id "${DEPLOYMENT_ID}" || true
          DEPLOYMENT_STATUS=$(aws deploy get-deployment \
            --deployment-id "${DEPLOYMENT_ID}" \
            --query 'deploymentInfo.status' \
            --output text)
          echo "Deployment status: ${DEPLOYMENT_STATUS}"
          if [ "${DEPLOYMENT_STATUS}" != "Succeeded" ]; then
            echo "Deployment failed or timed out"
            aws deploy get-deployment \
              --deployment-id "${DEPLOYMENT_ID}" \
              --query 'deploymentInfo.errorInformation'
            exit 1
          fi
