# Drop-in installed to
# /etc/systemd/system/otelcol-contrib.service.d/shelfalign.conf
# Adds the SSM-sourced OTEL_* vars (OTEL_S3_BUCKET, OTEL_SERVICE_NAME, ...)
# that the awss3 exporter resolves via ${env:...}, plus a resilient restart
# policy. The collector keeps the contrib package's default
# --config=/etc/otelcol-contrib/config.yaml, which shelfalign-otel-refresh rewrites.
[Service]
EnvironmentFile=-/etc/shelfalign-otel/otel.env
Restart=always
RestartSec=5
