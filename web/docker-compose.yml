services:
  postgres:
    image: postgres:16
    container_name: shelfalign-postgres
    environment:
      POSTGRES_USER: shelfalign
      POSTGRES_PASSWORD: shelfalign
      POSTGRES_DB: shelfalign
    ports:
      - "5432:5432"
    volumes:
      - shelfalign-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shelfalign -d shelfalign"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  shelfalign-postgres-data:
