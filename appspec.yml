version: 0.0
os: linux
files:
  - source: /
    destination: /opt/shelfalign-worker
    overwrite: true

file_exists_behavior: OVERWRITE

permissions:
  - object: /opt/shelfalign-worker
    owner: shelfalign-worker
    group: shelfalign-worker
    mode: 755
    type:
      - directory
  - object: /opt/shelfalign-worker
    owner: shelfalign-worker
    group: shelfalign-worker
    mode: 644
    pattern: "**/*"
    type:
      - file
  - object: /opt/shelfalign-worker/scripts/codedeploy
    owner: shelfalign-worker
    group: shelfalign-worker
    mode: 755
    pattern: "*.sh"
    type:
      - file

hooks:
  ApplicationStop:
    - location: scripts/codedeploy/application_stop.sh
      timeout: 60
      runas: root

  BeforeInstall:
    - location: scripts/codedeploy/before_install.sh
      timeout: 120
      runas: root

  AfterInstall:
    - location: scripts/codedeploy/after_install.sh
      timeout: 900
      runas: root

  ApplicationStart:
    - location: scripts/codedeploy/application_start.sh
      timeout: 60
      runas: root

  ValidateService:
    - location: scripts/codedeploy/validate_service.sh
      timeout: 360
      runas: root
